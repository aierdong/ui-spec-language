# Input Registry — password
# User's secret for authentication.
# Taxonomy: input.taxonomy.yaml → Credential.Password

id: password
label: "Password"
intent: "user's secret for authentication"
concept: Input
taxonomy_ref: "Input: Credential.Password"
aliases:
  - password
  - passphrase
kind: credential
sensitive: true
validation:
  - required
  - min-length
notes: |
  Credential + sensitive together (NF agent-instruction #3): kind: credential
  alone is not enough to mask the value. min-length typical bound is 8
  (taxonomy), but the numeric bound lives in the actual Constraint
  instance, not the registry shell.
