# Data Taxonomy
# Defines the hierarchy and inherited behavior of all Data sources.
# Concept reference: ontology/data.md

concept: Data
ontology_ref: ontology/data.md
intent: "External or internal information that the UI consumes, displays, or mutates"

taxonomy:

  # =========================================================================
  # Remote — Data from server-side sources
  # =========================================================================
  - id: Remote
    intent: "Data fetched from a remote server or service"
    inherits:
      freshness: on-demand
      lazy: false                   # Fetched eagerly by default
      scope: page
    children:

      - id: ApiCollection
        intent: "A paginated or full collection from a REST/GraphQL endpoint"
        inherits:
          source: api
          type: collection
          mutable: false             # Typically read-only unless explicitly declared
        aliases:
          - projects
          - records
          - items
          - list

      - id: ApiSingleton
        intent: "A single record from a REST/GraphQL endpoint"
        inherits:
          source: api
          type: singleton
          mutable: false
        aliases:
          - "table-schema"
          - "user-detail"
          - config

      - id: ApiMutableCollection
        intent: "A collection the user can modify (CRUD)"
        inherits:
          source: api
          type: collection
          mutable: true
        aliases:
          - "project-table-configurations"
          - editable-table

      - id: RealTimeStream
        intent: "Continuously updating data via WebSocket or SSE"
        inherits:
          source: api
          type: stream
          freshness: realtime
        aliases:
          - "live-log-stream"
          - websocket
          - realtime-feed

  # =========================================================================
  # Local — Data stored on the client device
  # =========================================================================
  - id: Local
    intent: "Data stored in the user's browser or device"
    inherits:
      mutable: true
      lazy: false                   # Loaded on access
    children:

      - id: PersistentPreference
        intent: "User preferences that survive browser restarts"
        inherits:
          source: local-storage
          type: dictionary
          scope: application
          freshness: cache-tolerant
        aliases:
          - "language-preferences"
          - "theme-preference"
          - settings

      - id: SessionScoped
        intent: "Temporary data cleared when the session ends"
        inherits:
          source: session-storage
          type: dictionary
          scope: session
        aliases:
          - session-data
          - temp-state

      - id: RecentItems
        intent: "Short history of recently accessed items"
        inherits:
          source: local-storage
          type: collection
          scope: application
          freshness: cache-tolerant
        aliases:
          - "recent-projects"
          - recently-viewed
          - history

  # =========================================================================
  # Inherited — Data passed from parent or context
  # =========================================================================
  - id: Inherited
    intent: "Data received from a parent Capability, Section, or application context"
    inherits:
      mutable: false                # Inherited data is typically read-only
    children:

      - id: ParentData
        intent: "Data passed from a parent Capability or Section"
        inherits:
          source: parent
          scope: section
          lazy: true                 # Available when parent provides it
        aliases:
          - parent-data
          - inherited-context

      - id: ApplicationContext
        intent: "Application-wide context data (user info, permissions, env)"
        inherits:
          source: context
          scope: application
          type: singleton
          freshness: cache-tolerant
        aliases:
          - "user-profile"
          - user-info
          - app-config
          - permissions
          - current-user

  # =========================================================================
  # Derived — Computed from other data sources
  # =========================================================================
  - id: Derived
    intent: "Data computed or derived from other data sources"
    inherits:
      source: computed
      mutable: false
      freshness: realtime            # Derived data updates when source data changes
    children:

      - id: FilteredView
        intent: "A filtered subset of a parent collection"
        inherits:
          type: collection
          depends-on: "Data: Remote.ApiCollection"
        aliases:
          - filtered-items
          - search-results

      - id: Aggregation
        intent: "Aggregated statistics from a collection (count, sum, avg)"
        inherits:
          type: singleton
        aliases:
          - stats
          - summary
          - totals

      - id: JoinedView
        intent: "Combined view from multiple data sources"
        inherits:
          type: collection
        aliases:
          - joined-data
          - enriched-record

  # =========================================================================
  # File — Data from static or uploaded files
  # =========================================================================
  - id: File
    intent: "Data loaded from files (static assets or user uploads)"
    children:

      - id: StaticAsset
        intent: "Predefined data bundled with the application"
        inherits:
          source: file
          type: dictionary
          mutable: false
          freshness: cache-tolerant
        aliases:
          - "translation-strings"
          - i18n
          - static-config

      - id: UploadedFile
        intent: "Data from a user-uploaded file"
        inherits:
          source: file
          mutable: true
          freshness: on-demand
        aliases:
          - uploaded-data
          - import-file

  # =========================================================================
  # Navigation — Data from URL parameters
  # =========================================================================
  - id: NavigationData
    intent: "Data extracted from the current URL or navigation event"
    children:

      - id: UrlParameter
        intent: "A value from the query string or path parameter"
        inherits:
          source: url-parameter
          type: singleton
          scope: page
        aliases:
          - query-param
          - route-param
          - url-param

      - id: CarriedData
        intent: "Data explicitly passed during a navigation event"
        inherits:
          source: parent
          scope: page
          lazy: true
        aliases:
          - pass-data
          - navigation-payload
