# State Taxonomy
# Defines the hierarchy and inherited behavior of all States.
# Concept reference: ontology/state.md
#
# Taxonomy-specific properties (not in ontology):
#   blocking: true    — State blocks user interaction (UX hint for rendering)

concept: State
ontology_ref: ontology/state.md
intent: "A transient condition of the UI at a given moment"

taxonomy:

  # =========================================================================
  # Lifecycle — Where a Capability is in its execution lifecycle
  # =========================================================================
  - id: Lifecycle
    intent: "Execution lifecycle states of a Capability"
    children:

      - id: Idle
        intent: "Normal interactive state. The default state."
        inherits:
          default: true              # This is the default for most capabilities
          blocks: []                 # Nothing blocked in idle state
        aliases:
          - idle
          - ready

      - id: Loading
        intent: "Data or content is being fetched or processed"
        inherits:
          blocks:                    # While loading, these are disabled
            - "Action: Submit"       # Prevent double-submission
            - "Action: CRUD.Delete"       # Prevent delete during load
          triggers:
            - "Feedback: Information.Progress"   # Show loading indicator
        aliases:
          - loading
          - fetching
          - in-progress

      - id: Processing
        intent: "An operation is in progress (post-submission)"
        inherits:
          blocks:
            - "Action: Submit"
            - "Action: CRUD.Delete"
            - "Action: Navigate.NavigateTo"  # Prevent navigation during processing
          triggers:
            - "Feedback: Information.Progress"
        aliases:
          - processing
          - running
          - executing

  # =========================================================================
  # Outcome — Result of an Action
  # =========================================================================
  - id: Outcome
    intent: "Result states after an Action completes"
    children:

      - id: Success
        intent: "The Action completed successfully"
        inherits:
          triggers:
            - "Feedback: Confirmation"
          duration: transient        # Auto-clear after feedback shown
        aliases:
          - success
          - completed
          - done

      - id: Error
        intent: "The Action failed"
        inherits:
          blocking: true             # User must acknowledge before continuing
          triggers:
            - "Feedback: Error"
          duration: sticky           # Persists until user dismisses or retries
        aliases:
          - error
          - failed
          - failure
          - auth-failed

      - id: PartialSuccess
        intent: "Some items succeeded, some failed"
        inherits:
          triggers:
            - "Feedback: Warning"
          duration: sticky
        aliases:
          - partial-success
          - partial-failed
          - partial

  # =========================================================================
  # Selection — What items are currently selected
  # =========================================================================
  - id: Selection
    intent: "Item selection states"
    children:

      - id: Unselected
        intent: "No items selected. Default state."
        inherits:
          default: true
        aliases:
          - unselected
          - none-selected

      - id: Selected
        intent: "One or more items are selected"
        inherits:
          enables:
            - "Action: CRUD.Delete"       # Bulk delete available when items selected
            - "Action: Export"
        aliases:
          - selected
          - items-selected

      - id: MultiSelected
        intent: "Multiple items selected, enabling batch operations"
        inherits:
          enables:
            - "Action: CRUD.Delete"
            - "Action: Export"
            - "Action: CRUD.Update"     # Batch update when multiple selected
        aliases:
          - multi-selected

  # =========================================================================
  # Availability — Whether an element can be interacted with
  # =========================================================================
  - id: Availability
    intent: "Interaction availability of an element"
    children:

      - id: Enabled
        intent: "Element is fully interactive"
        inherits:
          default: true
        aliases:
          - enabled
          - active

      - id: Disabled
        intent: "Element is visible but not interactive"
        inherits:
          reason: "Constraint or system state prevents interaction"
        aliases:
          - disabled
          - inactive
          - greyed-out

      - id: Locked
        intent: "Element is locked due to external condition (e.g., subscription required)"
        inherits:
          triggers:
            - "Feedback: Information"
        aliases:
          - locked
          - premium
          - requires-upgrade

  # =========================================================================
  # Visibility — Whether content is shown
  # =========================================================================
  - id: Visibility
    intent: "Content display states"
    children:

      - id: Visible
        intent: "Content is shown"
        inherits:
          default: true
        aliases:
          - visible
          - shown

      - id: Hidden
        intent: "Content is not rendered"
        inherits:
          reason: "Constraint hides this element"
        aliases:
          - hidden

      - id: Collapsed
        intent: "Detail content is collapsed; summary visible"
        inherits:
          default: true              # Often the default for collapsible sections
        aliases:
          - collapsed

      - id: Expanded
        intent: "Detail content is fully visible"
        aliases:
          - expanded

  # =========================================================================
  # Network — Connection quality states
  # =========================================================================
  - id: Network
    intent: "Network connectivity states"
    children:

      - id: Online
        intent: "Normal connectivity"
        inherits:
          default: true
        aliases:
          - online
          - connected

      - id: Offline
        intent: "No network connectivity"
        inherits:
          blocking: true             # Most actions blocked
          triggers:
            - "Feedback: Error"
          duration: persistent       # Until connectivity restored
        aliases:
          - offline
          - disconnected

      - id: Reconnecting
        intent: "Attempting to restore connectivity"
        inherits:
          triggers:
            - "Feedback: Information.Progress"
          blocks:
            - "Action: Submit"
            - "Action: CRUD.Delete"
        aliases:
          - reconnecting
          - slow-connection

  # =========================================================================
  # Validation — Form input validation states
  # =========================================================================
  - id: Validation
    intent: "Input validation lifecycle states"
    children:

      - id: Pristine
        intent: "Input has not been touched by the user"
        inherits:
          default: true
          feedback: none             # No error shown for untouched inputs
        aliases:
          - pristine
          - untouched

      - id: Dirty
        intent: "Input has been modified by the user"
        inherits:
          feedback: deferred         # Show validation on submit, not on change
        aliases:
          - dirty
          - modified
          - touched

      - id: Valid
        intent: "Input value passes all validation rules"
        aliases:
          - valid

      - id: Invalid
        intent: "Input value fails one or more validation rules"
        inherits:
          triggers:
            - "Feedback: Validation.ValidationError"
          blocks:
            - "Action: Submit"       # Prevent submission with invalid data
        aliases:
          - invalid
          - validation-failed

      - id: Validating
        intent: "Input value is being checked against rules"
        inherits:
          triggers:
            - "Feedback: Information.Progress"   # Show validating indicator
        aliases:
          - validating
          - checking
